services:
  - type: web
    name: goodle-backend
    runtime: python
    buildCommand: pip install -r requirements.txt -r requirements-backend.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_MOCK_MODE
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
